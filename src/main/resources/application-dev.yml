server:
  # Frontend URL — used as the base for Stripe success/cancel redirects and
  # any email link pointing back to the customer-facing site. Must NOT be the
  # backend port (8443); the browser has to land on the Next.js app.
  host-public: http://localhost:3000
  host-admin-public: http://localhost:8443
  ssl:
    enabled: false
  port: 8443
application:
  external:
    sync:
      offer-max-years: 1
      audit:
        enabled: true
        response-body: false
    nausys:
      base-url: ${NAUSYS_URL:http://ws.nausys.com}
      username: ${NAUSYS_USERNAME}
      password: ${NAUSYS_PASSWORD}
    mmk:
      base-url: ${MMK_URL:https://www.booking-manager.com/api/v2}
      bearer: ${MMK_TOKEN}
  upload:
    max-file-size: 10MB
    max-request-size: 50MB
    directory: /tmp/boat4you_data
  email:
    enabled: false
    # SMTP off locally — capture rendered templates to disk instead so invite /
    # password-reset / booking confirmation flows stay testable without SMTP.
    # Writes HTML to dev-log-dir (one file per send, timestamped). Ignored when
    # email.enabled is true.
    dev-log-to-file: true
    dev-log-dir: /tmp/b4y-emails
  stripe:
    enabled: true
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:boat4you_db}
    username: ${DB_USER:boat4you_app}
    password: ${DB_PASSWORD:boat4you_app}
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:boat4you_db}
    user: ${FLYWAY_USER:boat4you_owner}
    password: ${FLYWAY_PASSWORD:boat4you_owner}
    out-of-order: true
  jpa:
    properties:
      format_sql: false
    show-sql: false