        createdDate:
          type: string
          format: date-time
          description: Reservation creation date.
        paymentPlans:
          type: array
          items:
            $ref: '#/components/schemas/RestYachtReservationPaymentPlan'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/RestYachtReservationPayment'
        useDepositPayment:
          type: boolean
          description: Indicates if deposit payment is used.
        numberOfPayments:
          type: integer
          description: Number of payments.
        yachtCabins:
          type: array
