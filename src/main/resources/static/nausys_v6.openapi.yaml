        paymentCurrency:
          type: string
          description: Currency for the payment (e.g., HRK, EUR).
        restCabins:
          type: array
          description: List of cabins included in the reservation.
          items:
            $ref: '#/components/schemas/RestCabinRequest'
        displayCurrency:
          type: string
          description: >
            Optional parameter (defaults to "DEFAULT"). Defines currency format for response amounts.
            - For charter company login:
              - "DEFAULT": Default reservation currency.
              - "CLIENT": Currency in which the client pays to the charter company.
            - For agency login:
              - "DEFAULT": Default reservation currency.
              - "CLIENT": Currency in which the client pays to the agency.
              - "COMPANY": Currency in which the agency pays to the charter company.
    RestCabinRequest:
      type: object
      properties:
        cabinDefinitionId:
          type: integer
