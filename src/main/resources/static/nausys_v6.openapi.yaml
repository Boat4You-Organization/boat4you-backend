    RestFreeYachtsRequest:
      type: object
      required:
        - credentials
        - periodFrom
        - periodTo
      properties:
        credentials:
          $ref: '#/components/schemas/RestAuthentication'
        periodFrom:
          type: string
          format: date
          description: >-
            Dates passed in the request need to follow booking constraints for a boat. 
            Booking constraint rules can be found in `RestYachtCheckInPeriod`, such as
            SAT-SAT bookings requiring the dates to correspond to two consecutive Saturdays.
          example: "2023-05-01"
        periodTo:
          type: string
          format: date
          description: >-
            Dates passed in the request need to follow booking constraints for a boat. 
            Booking constraint rules can be found in `RestYachtCheckInPeriod`, such as
            SAT-SAT bookings requiring the dates to correspond to two consecutive Saturdays.
          example: "2023-05-07"
        priceFrom:
          type: number
          format: float
          description: The minimum price for the search.
          example: 500
        priceTo:
          type: number
          format: float
          description: The maximum price for the search.
          example: 5000
        yachts:
          type: array
          items:
            type: integer
            format: int64
          description: Contains yacht IDs.
          example: [ 302, 557323, 101723 ]
        orderby:
          type: integer
          description: >-
            Sorting options: 
            1 - base, 
            2 - price, 
            3 - yacht length, 
            4 - yacht cabins, 
            5 - yacht build year.
          example: 2
        desc:
          type: integer
          description: >-
            Sorting direction: 
            0 - ascending, 
            1 - descending.
          example: 1
        ignoreAvailability:
          type: boolean
          description: Whether to ignore availability in the search. Use `true` or `false`.
          example: false
        periods:
          type: array
          items:
            $ref: '#/components/schemas/Period'
          description: >-
            Allows sending multiple periods in one request. 
            When used, `periodFrom` and `periodTo` are ignored.
        extendedDataSet:
          type: string
          description: >-
            Comma-separated list of extended data types. Possible types: 
            `PAYMENT_PLAN`, `OBLIGATORY_SERVICES`, `ADDITIONAL_EXTRAS`. 
            Applicable only for a single yacht and period.
          example: "PAYMENT_PLAN,ADDITIONAL_EXTRAS"
        ignoreOptions:
          type: boolean
          description: >-
            When true, the result will include periods under options. 
            Can be used to place waiting options.
          example: true
        serviceIDs:
          type: array
          items:
            type: integer
          description: >-
            Specifies extra service IDs when `extendedDataSet` contains `ADDITIONAL_EXTRAS`. 
            Use IDs from `seasonSpecificData` of the boat.
          example: [ 101, 202 ]
        equipmentIDs:
          type: array
          items:
            type: integer
          description: >-
            Specifies extra equipment IDs when `extendedDataSet` contains `ADDITIONAL_EXTRAS`. 
            Use IDs from `seasonSpecificData` of the boat.
          example: [ 303, 404 ]
        currency:
          type: string
          description: Currency code (e.g., `EUR`, `HRK`, `USD`).
          example: "EUR"
    Period:
      type: object
      required:
        - periodFrom
        - periodTo
      properties:
        periodFrom:
          type: string
          format: date
          description: The start date of the period.
          example: "2023-05-01"
        periodTo:
          type: string
          format: date
          description: The end date of the period.
          example: "2023-05-07"
