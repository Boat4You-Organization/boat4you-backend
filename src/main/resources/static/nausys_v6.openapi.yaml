    RestFreeYachtsSearchRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/RestAuthentication'
        periodFrom:
          type: string
          format: date
          description: The start date of the period.
        periodTo:
          type: string
          format: date
          description: The end date of the period.
        countries:
          type: array
          items:
              type: integer
              format: int64
        regions:
          type: array
          items:
            type: integer
            format: int64
        locations:
          type: array
          items:
            type: integer
            format: int64
