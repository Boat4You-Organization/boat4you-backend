          description: Position in the waiting queue (1 = first, 2 = second, etc.).
    RestYachtReservationBookingRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/RestAuthentication'
        id:
          type: integer
          format: int64
          description: Reservation ID to be updated to a booking.
        uuid:
          type: string
          description: Unique identifier for the reservation.
        payment:
          $ref: '#/components/schemas/RestPayment'
        displayCurrency:
          type: string
          description: >
            Optional parameter (defaults to "DEFAULT"). 
            Determines the currency format for amounts in the response.
            For charter company login:
            - "DEFAULT": Returns amounts in the default reservation currency.
            - "CLIENT": Returns amounts in the currency the client pays to the charter company.
            
            For agency login:
            - "DEFAULT": Returns amounts in the default reservation currency.
            - "CLIENT": Returns amounts in the currency the client pays to the agency.
            - "COMPANY": Returns amounts in the currency the agency pays to the charter company.
            
            Important:
            Selection of displayCurrency affects the returned payment plans and payments:
            - For "CLIENT" or "DEFAULT", payments and plans between client and agency are returned.
            - For "COMPANY", payments and plans between agency and charter company are returned.
            Otherwise, no payment plans or payments will be included.
    RestPayment:
