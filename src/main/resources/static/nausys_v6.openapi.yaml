            type: integer
    RestYachtReservationOptionRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/RestAuthentication'
        id:
          type: integer
          format: int64
          description: The ID of the reservation.
        uuid:
          type: string
          description: Unique identifier for the reservation.
        createWaitingOption:
          type: string
          description: >
            Required parameter (deprecated). Possible values:
            - "true": Create a waiting option.
            - "false": Do not create a waiting option.
        displayCurrency:
          type: string
          description: >
            Optional parameter (defaults to "DEFAULT"). Specifies the currency format for the response amounts.
            - For charter company login:
              - "DEFAULT": Returns amounts in the default reservation currency.
              - "CLIENT": Returns amounts in the currency the client pays to the charter company.
            - For agency login:
              - "DEFAULT": Returns amounts in the default reservation currency.
