        baseToId:
          type: integer
          format: int64
          description: Charter base ID of the arrival base.
        locationFromId:
          type: integer
          description: Location ID of the embarkment base.
        locationToId:
          type: integer
          description: Location ID of the arrival base.
        periodFrom:
          type: string
          format: date-time
          description: >-
            Check-in date and time (format: dd.MM.yyyy HH:mm).
        periodTo:
          type: string
          format: date-time
          description: >-
            Check-out date and time (format: dd.MM.yyyy HH:mm).
        optionTill:
          type: string
          format: date-time
          description: Option valid until date and time (only applicable if status is OPTION).
        agency:
          type: string
