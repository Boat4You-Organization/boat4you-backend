    RestResponse:
      type: object
      properties:
        status:
          type: string
          description: Human-readable status of the request. Possible reference to RestStatus, not clear from documentation examples.
        errorCode:
          type: number
          description: Error code displayed only if an error occurred.
    RestStatus:
      type: object
      properties:
        status:
          type: string
          description: Human-readable status of the request.
          enum:
            - OK
            - AUTHENTICATION_ERROR
            - OPERATION_NOT_ALLOWED
            - INSUFFICIENT_DATA
            - INVALID_DATE_FORMAT
            - INVALID_NUMBER_FORMAT
            - INVALID_EMAIL_FORMAT
            - CREW_LIST_LOCKED
            - INVALID_COUNTRY_ID
            - INVALID_YACHT_ID
            - WRONG_YACHT_OWNERSHIP
            - NOT_ALLOWED_TO_BOOK_THIS_YACHT
            - INVALID_PAYMENT_METHOD
            - INVALID_CURRENCY
            - UNKNOWN_ERROR
        errorCode:
          type: number
          description: >
            Numeric error code indicating the specific error or success status. 
            Possible values:
            - `0`: OK
            - `100`: AUTHENTICATION_ERROR
            - `101`: OPERATION_NOT_ALLOWED
            - `201`: INSUFFICIENT_DATA
            - `202`: INVALID_DATE_FORMAT
            - `203`: INVALID_NUMBER_FORMAT
            - `204`: INVALID_EMAIL_FORMAT
            - `301`: CREW_LIST_LOCKED
            - `401`: INVALID_COUNTRY_ID
            - `402`: INVALID_YACHT_ID
            - `403`: WRONG_YACHT_OWNERSHIP
            - `404`: NOT_ALLOWED_TO_BOOK_THIS_YACHT
            - `405`: INVALID_PAYMENT_METHOD
            - `406`: INVALID_CURRENCY
            - `999`: UNKNOWN_ERROR
    RestYachtReservationRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/RestAuthentication'
        id:
          type: integer
          format: int64
          description: The ID of the reservation to be processed.
        uuid:
          type: string
          description: Unique identifier for the reservation.
        displayCurrency:
          type: string
          description: >
            Optional parameter (defaults to "DEFAULT") specifying the currency format for response amounts.
            - For charter company login:
              - "DEFAULT": Returns amounts in default reservation currency.
              - "CLIENT": Returns amounts in the currency the client pays to the charter company.
            - For agency login:
              - "DEFAULT": Returns amounts in default reservation currency.
              - "CLIENT": Returns amounts in the currency the client pays to the agency.
              - "COMPANY": Returns amounts in the currency the agency pays to the charter company.
            
            Important for agency login:
            - Selecting "CLIENT" or "DEFAULT" returns payment plans and payments from the client to the agency.
            - Selecting "COMPANY" returns payment plans and payments from the agency to the charter company.
            - No payment plans or payments are returned otherwise.
