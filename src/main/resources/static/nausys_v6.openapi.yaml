          items:
            type: integer
        equipment:
          type: array
          description: List of additional equipment IDs for the reservation.
          items:
            type: integer
        onlinePayment:
          type: string
          description: TRUE if the request is for online booking payment; otherwise FALSE.
        promoCode:
          type: string
          description: Promotional code for the reservation.
        numberOfPayments:
          type: integer
          description: Number of payments for the reservation.
        paymentCurrency:
          type: string
          description: Currency for the payment (e.g., HRK, EUR).
        useDepositPayment:
          type: string
