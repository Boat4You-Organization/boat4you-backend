        date:
          type: string
          format: date
          description: Payment date in the format dd.MM.yyyy.
        paymentMethod:
          type: string
          description: Method of payment.
        approvalCode:
          type: string
          description: Approval code for the payment transaction.
    RestCabinReservation:
