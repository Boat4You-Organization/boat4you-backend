            - "50" (with `agencyClientDiscountAmountType="PERCENTAGE"`)
        agencyClientDiscountAmountType:
          type: string
          description: >
            Used only by agencies. Optional. Must be combined with 
            `agencyClientDiscountAmount`. Possible values:
            - "PERCENTAGE"
            - "AMOUNT"
        displayCurrency:
          type: string
          description: >
            Optional parameter (defaults to "DEFAULT"). 
            - For charter companies:
              - "DEFAULT": Returns amounts in default reservation currency.
              - "CLIENT": Returns amounts in the currency the client pays to the charter company.
            - For agencies:
              - "DEFAULT": Returns amounts in default reservation currency.
