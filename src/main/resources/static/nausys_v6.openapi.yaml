  /CBMS-external/rest/catalogue/v6/yachts/{charterCompanyId}:
    post:
      summary: Retrieve all yachts
      operationId: allYachts
      description: Provides a list of all yachts for the specified charter company.
      parameters:
        - name: charterCompanyId
          in: path
          required: true
          description: ID of the charter company.
          schema:
            type: integer
            format: int64
            example: 201
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllYachtsRequest'
      responses:
        '200':
          description: Successful response with yacht details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestYachtList'
        '401':
          description: Unauthorized access
        '500':
          description: Server error
  /CBMS-external/rest/catalogue/v6/yachtModels:
    post:
      summary: Retrieve all yacht models
      operationId: allYachtModels
