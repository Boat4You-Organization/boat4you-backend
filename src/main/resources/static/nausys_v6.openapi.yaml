        '401':
          description: Unauthorized access.
        '500':
          description: Server error.
  /CBMS-external/rest/catalogue/v6/yacht/{yachtId}:
    post:
      summary: Retrieve details of a specific yacht
      operationId: singleYacht
      description: Provides details of a single yacht based on the provided yacht ID.
      parameters:
        - name: yachtId
          in: path
          required: true
          description: The ID of the yacht to retrieve details for.
          schema:
            type: integer
            example: 103152
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestAuthentication'
      responses:
        '200':
          description: A detailed response for the specified yacht.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestYachtList'
        '401':
          description: Unauthorized access.
        '500':
          description: Server error.
  /CBMS-external/rest/yachtReservation/v6/reservations:
    post:
      summary: Get all reservations
      description: Provides all reservations in a given period made by this agency (or charter company depending on credentials).
      operationId: getAllReservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestYachtReservationsRequest'
