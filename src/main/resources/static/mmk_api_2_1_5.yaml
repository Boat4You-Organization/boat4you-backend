      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Long'
      style: form
      explode: true
      examples:
        oneId:
          summary: Example of a company id
          value: [191]
        multipleIds:
          summary: Example of multiple company ids
          value: [191, 724, 380]
    countryArray:
      in: query
