tags:
  - name: Booking
    description: Charter companies using the API to manage their own fleet info
  - name: Invoice
    description: Invoicing and Payment API
  - name: Advanced
    description: "Advanced data manipulation API allows you to access and change detailed information in your Booking Manager "

paths:
  '/countries':
    get:
      summary: Provides a list of countries
      operationId: getCountries
      description: |-
        Retrieves a list of all *ISO-3166* countries and their short, long codes and world region code. Countries from the list present the countries of dedicated bases of the boats. 
        
         More about the ISO-3166 standard here https://www.iso.org/iso-3166-country-codes.html  
      
      responses:
        '200':
          description: returns a list of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country'

        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/country/{id}':
    get:
      summary: Gets a specific country
      operationId: getCountryById
      description: Rretrieves only one country by id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: returns a matching country
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/worldRegions':
    get:
      summary: Provides a list of world regions
      operationId: getWorldRegions
      description: Retrieves a list of world regions. World Regions are used to group countries in larger world areas and should not be confused with sailing areas
      responses:
        '200':
          description: returns a list of world regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorldRegion'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/worldRegion/{id}':
    get:
      summary: Gets a specific world region
      operationId: getWorldRegionById
      description: Returns only one worldRegion matching the Id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: returns a matching world region
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorldRegion'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/sailingAreas':
    get:
      summary: Provides a list of sailing areas
      operationId: getSailingAreas
      description: Retrieves a full list of sailing areas. Sailing area is a more local geographical unit considered to be a single destination by sailors. This area can be comprised of multiple bases and is not always limited to only one country.
      responses:
        '200':
          description: returns a list of sailing areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SailingArea'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/sailingArea/{id}':
    get:
      summary: Gets a specific sailing area
      operationId: getSailingAreaById
      description: Returns only one sailing area with the matching id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: returns a matching sailing area
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SailingArea'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/bases':
    get:
      summary: Provides a list of bases
      operationId: getBases
      description: Calling */bases* retrieves a list of bases that are assigned for each boat. The base is the exact location where the boat is located. One base can belong to more sailing areas. In that case, multiple dedicated sailing areas are separated by commas. An example of connecting the bases with sailing areas is with - Country Italy - countryId is 380. That base belongs to the sailing area - 18. In sailing areas function, this id belongs to the Tyrrhenian Sea. So, you can then connect the Sapri base with the Tyrrhenian Sea, and the same for all other bases that belong to sailingAreas - 18.
      responses:
        '200':
          description: returns a list of available bases with dedicated base description.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Base'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/base/{id}':
    get:
      summary: Gets a specific base
      operationId: getBaseById
      description: Calling */base/{id}* with specific id returns only one base with that id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: returns a matching base id with all detailed information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Base"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/equipment':
    get:
      summary: Provides a list of equipment categories
      operationId: getEquipment
      description: Calling */equipment* retrieves a list of equipment categories. Each boat can have multiple equipment items, and equipment items have dedicated equipment categories. Dedicated equipment categories represent categories that can be used as search option filter on the web page, for more precise search of boats with dedicated equipment.
      parameters:
        - in: query
          name: language
          description: "Translation language"
          required: false
          schema:
            $ref: '#/components/schemas/SupportedLanguagesEnum'
      responses:
        '200':
          description: returns a list of equipment categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Equipment"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/companies':
    get:
      summary: Provides a list of companies
      operationId: getCompanies
      description: Calling */companies* retrieves a list of companies
      responses:
        '200':
          description: Agencies retrieves the list of all the Charter operators in the Booking Manager System who manage their resources */yachts* availability in real time. This list provides the id's of the companies that are available for synchronisation and for real time booking. Charter retrives
            data only about themselves.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/company/{id}':
    get:
      summary: Gets a specific company
      operationId: getCompanyBy
      description: Calling */company/{id}* with specific id returns only one company with requested id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: returns a matching company id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/shipyards':
    get:
      summary: Provides a list of shipyards
      operationId: getShipyards
      description: Calling */shipyards* retrieves a list of shipyards of the boats.
      responses:
        '200':
          description: Returns a list of boat shipyards.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shipyard"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/shipyard/{id}':
    get:
      summary: Gets a specific shipyard
      operationId: getShipyardById
      description: Calling */shipyard/{id}* with specific id returns only one shipyard with that id
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: returns a matching shipyard id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipyard"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/yachts':
    get:
      summary: Provides a list of yachts
      operationId: getYachts
      description: Calling */yachts* retrieves a list of yachts, with all the detailed information and description of the boat. Description contains boat technical specifications, images and dedicated equipment categories. Also, information about applicable extra services for different products (Bareboat, Crewed, Cabin, Flotilla, Regatta and Allinclusive) are visible. One boat can have multiple products assigned (e.g. Bareboat and Crewed) at the same time, therefore each product has its own elaboration of applicable extras.
      parameters:
        - $ref: '#/components/parameters/language2'
        - $ref: '#/components/parameters/company'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/inventory'
        - $ref: '#/components/parameters/kind'

      responses:
        '200':
          description: Explanation of the response structure <br /><br />
            First part  of the response contains technical info of the boat  <br /><br />
            id = unique resource id<br />
            name = the name of the individual yacht<br />
            model= name of the model<br />
            shipyardID= id of the shipyard (boat manufacturer)<br />
          
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Yacht'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/yacht/{id}':
    get:
      summary: Gets a specific yacht
      operationId: getYacthById
      description: Calling */yacht/{id}* with specific id returns only one yacht with that id and all dedicated details.
      parameters:
        - $ref: '#/components/parameters/language2'
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/inventory'
      responses:
        '200':
          description: returns a matching yacht id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Yacht'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
      tags:
        - Booking
  '/yachtTypes':
    get:
      summary: Provides a list of yacht types(kind)
      operationId: getYachtTypes
      description: Retrieves a list of yacht types
      responses:
        '200':
          description: returns a list of yacht types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YachtTypes"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/yachtsOnSale':
    get:
      summary: Provides a list of yachts on sale
      operationId: getYachtsOnSale
      description: This call returns the same information as `/yachts` with additional information that is only only valid for yachts that are on sale.
      parameters:
        - $ref: '#/components/parameters/language2'
        - $ref: '#/components/parameters/company'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/inventory'
        - $ref: '#/components/parameters/kind'

      responses:
        '200':
          description: Returns a list of yachts on sale with sale information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YachtOnSale'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/offers':
    get:
      summary: Provides a list of available offers
      operationId: getOffers
      description: Returns a list of all available yachts according to selected parameters such as -date from, date to, flexibility, product name, currency and trip duration. Flexibility presents timeframe (along with dates) as an additional filter to retrieve results If you use flexibility 6 (in a year), returned available boats will be only the ones that have default check-in day Saturday. All other selected flexibility parameters will return all available departures (e.g Friday, Monday etc.)
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/dateTo'
        - $ref: '#/components/parameters/flexibility'
        - $ref: '#/components/parameters/companyIdArray'
        - $ref: '#/components/parameters/countryArray'
        - $ref: '#/components/parameters/product'
        - $ref: '#/components/parameters/baseFromIdArray'
        - $ref: '#/components/parameters/baseToIdArray'
        - $ref: '#/components/parameters/sailingAreaIdArray'
        - $ref: '#/components/parameters/yachtIdArray'
        - $ref: '#/components/parameters/modelIdArray'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/tripDurationArray'
        - $ref: '#/components/parameters/minCabins'
        - $ref: '#/components/parameters/maxCabins'
        - $ref: '#/components/parameters/minBerths'
        - $ref: '#/components/parameters/maxBerths'
        - $ref: '#/components/parameters/minHeads'
        - $ref: '#/components/parameters/maxHeads'
        - $ref: '#/components/parameters/minLength'
        - $ref: '#/components/parameters/maxLength'
        - $ref: '#/components/parameters/showOptions'
        - $ref: '#/components/parameters/passengersOnBoard'
        - $ref: '#/components/parameters/kind'
        - $ref: '#/components/parameters/minYearOfBuild'
        - $ref: '#/components/parameters/maxYearOfBuild'

      responses:
        '200':
          description: returns a list of yachts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
      tags:
        - Booking
  '/specialOffers':
    get:
      summary: Provides a list of special offers
      operationId: getSpecialOffers
      description: |
        Calling */specialOffers* retrieves a list of special offers (one way or short terms). One way offer presents an offer where the boat can start or end its charter in a different base than its home base. 

        The boat can start on a different base than its home base if e.g. week before the requested period, the boat ended in a different base than its home base and then it's offered from that other base at a particular period. 

        If the boat has base A, and ends up a charter in base B, on the date when it finished in base B, it will be offered from that base. The short term presents an offer where the duration of the charter will be less than 7 days. This means that boat can depart on e.g. Saturday and end charter on Wednesday. In the week (certain day) where a boat ended its charter on Wednesday, it will be offered as a special offer ( short term) until the next available check-in day (default check-in day of the boat).
      parameters:
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/flexibility'
        - $ref: '#/components/parameters/companyIdArray'
        - $ref: '#/components/parameters/countryArray'
        - $ref: '#/components/parameters/product'
        - $ref: '#/components/parameters/baseFromIdArray'
        - $ref: '#/components/parameters/baseToIdArray'
        - $ref: '#/components/parameters/yachtIdArray'
        - $ref: '#/components/parameters/modelIdArray'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/tripDurationArray'
        - $ref: '#/components/parameters/minCabins'
        - $ref: '#/components/parameters/maxCabins'
        - $ref: '#/components/parameters/minBerths'
        - $ref: '#/components/parameters/maxBerths'
        - $ref: '#/components/parameters/minHeads'
        - $ref: '#/components/parameters/maxHeads'
        - $ref: '#/components/parameters/minLength'
        - $ref: '#/components/parameters/maxLength'
        - $ref: '#/components/parameters/passengersOnBoard'
        - $ref: '#/components/parameters/minYearOfBuild'
        - $ref: '#/components/parameters/maxYearOfBuild'
      responses:
        '200':
          description: returns a list of available yachts for requested special offer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpecialOffer'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
      tags:
        - Booking
  '/specialOffers/{offerType}':
    get:
      summary: Provides a list of special offers
      operationId: getSpecialOffersByType
      description: Calling */specialOffers* retrieves a list of special offers (one way or short term offers)
      parameters:
        - in: path
          name: offerType
          description: offer type
          required: true
          schema:
            type: string
            enum:
              - all
              - oneway
              - shortoffers
        - $ref: '#/components/parameters/dateFrom'
        - $ref: '#/components/parameters/flexibility'
        - $ref: '#/components/parameters/companyIdArray'
        - $ref: '#/components/parameters/countryArray'
        - $ref: '#/components/parameters/product'
        - $ref: '#/components/parameters/baseFromIdArray'
        - $ref: '#/components/parameters/baseToIdArray'
        - $ref: '#/components/parameters/sailingAreaIdArray'
        - $ref: '#/components/parameters/yachtIdArray'
        - $ref: '#/components/parameters/modelIdArray'
        - $ref: '#/components/parameters/currency'
        - $ref: '#/components/parameters/tripDurationArray'
        - $ref: '#/components/parameters/minCabins'
        - $ref: '#/components/parameters/maxCabins'
        - $ref: '#/components/parameters/minBerths'
        - $ref: '#/components/parameters/maxBerths'
        - $ref: '#/components/parameters/minHeads'
        - $ref: '#/components/parameters/maxHeads'
        - $ref: '#/components/parameters/minLength'
        - $ref: '#/components/parameters/maxLength'
        - $ref: '#/components/parameters/passengersOnBoard'
        - $ref: '#/components/parameters/minYearOfBuild'
        - $ref: '#/components/parameters/maxYearOfBuild'
      responses:
        '200':
          description: returns a list of yachts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SpecialOffer'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
      tags:
        - Booking
  '/prices':
    get:
      summary: Provides a list of yacht prices
      operationId: getPrices
