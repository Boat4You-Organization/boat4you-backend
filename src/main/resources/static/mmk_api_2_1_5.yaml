servers:
  - description: Booking Manager Production
    url: https://www.booking-manager.com/api/v2
  - description: Booking Manager Beta
    url:  http://beta.booking-manager.com/api/v2
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/mmksystems/bm-api/2.0.0
info:
  description: |-
    # Booking Manager API for Agencies and Charter Fleets
    
    Booking Manager API is a standard Web service that enables clients to connect their data with external systems and services and to extend the automation benefits of the Booking Manager System.
    - It is used by charter agencies to publish availabilities of Charter Operators and automate booking processes by connecting Booking Manager to their own websites to allow for seamless online booking experience for end-users or integrating it with their CRM solutions in order to automate office procedures.
    - Charter operators use the web service to connect Booking Manager with their bookkeeping software and save time and effort in the accounting department.
    - Third-Party Software tools also use Booking Manager API to display richer information, for example, boat tracking systems are able to visualise client contact information directly on the map showing the boat location in real-time.
    ## Document Changes
    ### 12.12.2024
    - Added new field to `ReservationResponse`: - securityDeposit - price of security deposit in Reservation currency
    - Added new call GET `/yachtOnSale` - returns yachts that are on sale with additional fields: 
      * salePrice - price of yacht
      * saleCurrency - currency of sale price
      * saleComment - additional comment
    ### 22.11.2024
    - GET `/reservation` & GET `/reservations` now return `charterResevationId` for agencies
     ### 14.11.2024
    - added GET `/skippers`- returns a list of skippers
     ### 02.10.2024
    - added `creationDate` and `confirmationDate` to `ReservationResponse` schema - note, confirmation date on the options is the same date as the creation date
    ### 08.08.2024
    - POST `/reservation` - added `sendNotification` parameter to request body
    - PUT `/reservation` - added `sendNotification` query parameter
    ### 10.07.2024
    - GET `/yacht` & `/yachts` - added `certificate` field to response
    - GET `/offers` - added `myReservationId` to response when parameter `showOptions` is set to true
    ### 06.04.2024
    - GET `/yachts` - added `kind` parameter 
     ### 22.02.2024
    - GET `/yacht` & `/yachts` - added `language` parameter for equipment and extras translations 
     ### 27.12.2023
    - GET `/offers` & `/specialOffers` - added `minYearOfBuild`, `maxYearOfBuild` parameters
    - GET `/yacht` & `/yacht{id}` - added `isDefaultProduct` boolean flag to Product scheme
     ### 05.12.2023
    - GET `/yacht` & `/yachts` - added `crew` field to response - list of crew members for crewed yachts, 
    added `descriptions` field to response
    - added `crewedByDefault` field to `Product` model
    ### 05.12.2023
    - GET `/offers` - added `obligatoryExtras` list to response
    ### 04.10.2023
    - GET `/yacht` & `/yachts` - added `equipmentRaw` field to response when paramter `inventory` is set to `raw` 
    ### 09.06.2023
    - GET `/shortAvailability` - added new status response - Sleepaboard
    ### 24.04.2023
    - GET `/yachts`&`/yacht`  - added new parameters to response - `availableInBase`, `validSailingAreas`, `wcNote`, `cabinsNote`, `berthsNote`, `minimumcharterDuration`, `maxPeopleOnBoard`, `validDateFrom`, `validDateTo`, `description`
    - GET `/company` - added new parameter to response - `maxDiscountFromCommissionPercentage`
    - GET `/reservation` - added new parameter to response - `reservationCode`
    - POST `/reservation` - added new optional request parameter - `passengersOnBoard`

    ### 14.04.2023
    - GET `/objects/{entity}/properties` - function to retrieve a list of entity property info
    ### 01.02.2023
    - GET `/yachtTypes` - function to retrieve a list of yacht types(kind)
    - GET `/equipment` - added a list of supported languages
    ### 02.01.2023
    - GET `/yachts` - added equipment field with id and value for each equipment to the response
    - GET `/yacht` - added equipment field with id and value for each equipment to the response
     ### 02.01.2023
    - GET `/yachts` - added minCharterDuration to the response
    - GET `/yacht` - added minCharterDuration to the response
    ### 20.12.2022
    - GET `/companies` - added checkoutNote to the response
    - GET `/company` - added checkoutNote to the response
     ### 11.11.2022
    - GET `/users` - function to retrieve a list of users and their properties
    - GET `/users{id}` - function to retrieve a user and it's properties
    - PUT `/users{id}` - function to update an existing user
    - POST `/users` - function create a new user
    - POST `/users/search` - function that returns used based on a filter
    - /reservations added clientId parameter to the response

     ### 12.11.2020
    - GET `/crewListLink` - function to retrieve link to crew list entry page
    ### 12.06.2020
    - `/yachts` added `sailingDateFrom/To` parameter to the response
    - `/yachts` added `maxPeopleOnBoard` parameter to the response
    ### 29.05.2020
    - `/companies` more information added in response - address, additional telephone and additional mobile number
    - `/offers` added `kind` parameter in the request
    - `/yachts` added `validForBases from/to` parameter to the response
    ### 10.04.2020  
    - `/yachts` added `shipyardId` parameter to the response
    - POST `/addDocument` - function to add document on specific item
    - `/offers` added `sailingAreaId` as additional parameter in request
    - PUT `/reservation` added `expirationDate` for options
    
    ### 12.03.2020.
    - Extras valid for certain yacht in `/yachts`
    - `/yachts` function with extras duration parameter - `validDaysFrom`/`validDaysTo`
    - `/yachts` function with year of build `year`, default yacht deposit `deposit`, commision percentage `commissionPercentage` and default check in day `defaultCheckInDay`
    - `/yacht` field `lenghtAtWaterline` corrected to length

