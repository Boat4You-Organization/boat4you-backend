        country:
          type: string
          example: "Croatia"
        telephone:
          type: string
          example: "+3851 3773 951"
        telephone2:
          type: string
          example: "+3851 1234 567"
        mobile:
          type: string
          example: "+385 98/1234-567"
        vatCode:
          type: string
          example: "HR123456789"
        email:
