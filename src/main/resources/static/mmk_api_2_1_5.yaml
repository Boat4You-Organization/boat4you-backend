# 2) Apply the security globally to all operations
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    400:
      description: Bad request.
    401:
      description: Authorization Bearer token is missing or invalid.
    404:
      description: Entity not found.
    422:
      description: Unprocessable obligatory field.

  parameters:
    id:
      in: path
      name: id
      description: entity id
      required: true
      schema:
        $ref: '#/components/schemas/Long'
    reservationId:
      in: path
      name: reservationId
      description: reservation id
      required: true
      schema:
        $ref: '#/components/schemas/Long'
    userId:
      in: path
      name: id
      description: Id of the user
      required: true
      schema:
        $ref: '#/components/schemas/Long'
    entity:
      in: path
      name: entity
      description: Represents Booking Manager domain object
      required: true
      schema:
        $ref: '#/components/schemas/Entity'
    flexibility:
      in: query
      name: flexibility
      description: >
        `1` - on day `2` - in week `3` - one week `4` - two weeks `5` - in month `6` - in year `7` - in year
      required: false
      schema:
        $ref: "#/components/schemas/Flexibility"
    product:
      in: query
      name: productName
      description: product name
      required: false
      schema:
        $ref: "#/components/schemas/ProductEnum"
    kind:
      in: query
      name: kind
      description: Yacht type
      required: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/KindEnum"
    minYearOfBuild:
      in: query
      name: minYearOfBuild
      description: Minimum build year for yachts
      required: false
      schema:
        type: integer
    maxYearOfBuild:
      in: query
      name: maxYearOfBuild
      description: Maximum build year for yachts
      required: false
      schema:
        type: integer
    year:
      in: path
      name: year
      description: specific year
      required: true
      schema:
        type: integer
        example: 2019
    dateFrom:
      in: query
      name: dateFrom
      description: date format&#58; yyyy-MM-ddTHH:mm:ss
      required: true
      schema:
        $ref: '#/components/schemas/DateTime'
    dateTo:
