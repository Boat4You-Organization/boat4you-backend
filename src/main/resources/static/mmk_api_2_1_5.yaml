  '/shortAvailability/{year}':
    get:
      summary: Gets shortAvailability
      operationId: getShortAvailability
      description: |+
        Calling */shortAvailability/{id}* return availability for specific year. The different status formats will retrieve results in different formats. 
        - 1 Binary - availability information for the resource in binary format. Each availability info is 365 characters long (or 366 in case of the leap year) and it represents the whole year (the single character is one day of the year). The first character is January 1st, the second character is January 2nd, and so on. If a character is equal to “0” it means that the yacht is available on that day, otherwise, character is equal to “1”.
        - 2 Hex - availability information for the resource in hexadecimal format. Each availability info is 92 characters long and it represents the whole year. The first character is January 1, January 2, January 3 and January 4, the second character is January 5, January 6, January 7 and January 8, and so on. The last characters should be discarded depending on how long the requested year is. For example, if availability info is “fe03f0..” in binary it is “0000 0001 1111 1100 0000 1111..” and it means that yacht is available from January 1 until January 8, but it is not available from January 8 until January 15, and so on.
        - 3 Status - Response is the same as the Binary response with one difference – booked days are not represented with character “1” for all types of reservations but instead reservation status id is used. For example, if availability info is “2222 2220 0000...” it means that boat is under status Option from January 1 until January 8, and it is free from January 8 etc.
      parameters:
        - $ref: '#/components/parameters/year'
        - $ref: '#/components/parameters/company'
        - in: query
          name: yachtId
          description: yacht id
          required: false
          schema:
            $ref: '#/components/schemas/Long'
        - in: query
          name: format
          description: >
            `1` - binary `2` - hex `3` - status
          required: false
          schema:
            type: integer
            enum: [1,2,3]
      responses:
        '200':
          description: |+
            returns a short availability. There are several status codes
            - **0** Available 
            - **1** Reservation 
            - **2** Option
            - **3** Option in expiration
            - **4** Service
            - **B** Sleepaboard (for charters)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShortAvailability'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
      tags:
        - Booking
  '/addDocument/{itemType}':
    post:
      summary: Add document
      operationId: addDocuent
      description: Calling */addDocument* is used to place a document on a specific item in the Booking Manager system. You can add various document/s on  - a yacht, yacht model, reservation or an user from the addressbook. Yacht model and yacht id can be retrieved from /yachts response, reservation id from /reservations. Successful document upload returns -
        "UPLOADED"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
      parameters:
        - in: path
          name: itemType
          description: ""
          required: true
          schema:
            $ref: '#/components/schemas/ItemTypeEnum'
        - in: query
          name: id
          description: "Entity id"
          required: true
          schema:
            type: integer
            format: int64
            example: 1188200267800225
        - in: query
          name: description
          description: "Document description"
          required: true
          schema:
            type: string
            example: "Document description"
      responses:
        '201':
          description: HTTPS status Created. Returns reservation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
      tags:
        - Booking
