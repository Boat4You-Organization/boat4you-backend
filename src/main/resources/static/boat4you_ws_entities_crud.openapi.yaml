openapi: 3.0.3
info:
  title: Boat4You Web Service
  description: |-
    API definition for Boat4You Web Service. \
    Contains operations related to Users
  version: 0.0.1
servers:
  - url: https://localhost:8443
    description: Local deployment
tags:
  - name: Auth
    description: Authentication operations
  - name: Users
    description: Operations about Users
  - name: Yachts
    description: Operations about Yachts
  - name: Agencies
    description: Operations about Agencies
  - name: Locations
    description: Operations about Locations
  - name: YachtImages
    description: Operations about YachtImages
  - name: Catalogue
    description: Operations about Manufacturers and Models
  - name: Reservations
    description: Operations about reservations
  - name: ReservationFlows
    description: Operations about reservation flows
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Logs user into the system
      description: ''
      operationId: loginUser
      requestBody:
        description: ''
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '500':
          description: Internal server error
  /auth/refreshToken:
    post:
      tags:
        - Auth
      summary: Issues a refresh token to authenticated user
      description: ''
      operationId: refreshToken
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '500':
          description: Internal server error
  /auth/logout:
    get:
      tags:
        - Auth
      summary: Logs out the currently logged in user
      description: ''
      operationId: logoutUser
      responses:
        '200':
          description: successful operation
  /auth/updatePassword:
    post:
      tags:
        - Auth
      summary: Update User password
      description: This can only be done by the logged in user. Users can only change their own password.
      operationId: updatePassword
      requestBody:
        description: Update password of an existing User
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPasswordBody'
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /auth/requestPasswordReset:
    post:
      tags:
        - Auth
      summary: Request password reset for a user
      description: Results in sending a password reset email. This can be done by Manager, System Administrator or an anonymous user.
      operationId: requestPasswordReset
      requestBody:
        description: Request password reset body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetBody'
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /auth/resetPassword:
    get:
      tags:
        - Auth
      summary: Check password reset validity
      description: Called when User clicks on the password reset link, so the FE knows if the password reset link is invalid.
      operationId: checkPasswordResetValidity
      parameters:
        - name: passwordResetCode
          in: query
          description: Password reset code of the password reset request
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
    post:
      tags:
        - Auth
      summary: Set a new password as part of the password reset process
      description: Set a new password as part of the password reset process. This can be done by an anonymous user.
      operationId: resetPassword
      parameters:
        - name: passwordResetCode
          in: query
          description: Password reset code of the password reset request
          required: true
          schema:
            type: string
      requestBody:
        description: Reset password body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserPasswordBody'
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get info about current user
      description: This can only be done by the logged in user. Logged users can only get information about themselves.
      operationId: getAuthenticatedUserInfo
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '404':
          description: User not found
        '500':
          description: Internal server error
  /auth/register:
    put:
      tags:
        - Auth
      summary: User registration
      description: User registration, anyone can register
      operationId: registerUser
      requestBody:
        description: ''
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /auth/register/verifyEmail:
    post:
      tags:
        - Auth
      summary: Email verification
      description: Used when registering, when user submits the verification code.
      operationId: verifyEmail
      requestBody:
        description: ''
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailVerificationRequest'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /auth/register/resendVerificationCode/{userId}:
    post:
      tags:
        - Auth
      summary: Resend email verification code
      description: Used when registering, when user wants the email verification code to be resent.
      operationId: resendEmailVerificationCode
      parameters:
        - name: userId
          in: path
          description: Id of the user who wants a new verification code
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /users:
    get:
      tags:
        - Users
      summary: Fetch all users
      description: This can only be done by the logged in user. Requires "SYSTEM_ADMIN" or "MANAGER" role.
      operationId: getAllUsers
      parameters:
        - $ref: 'boat4you_ws_common.openapi.yaml#/components/parameters/sortBy'
        - $ref: 'boat4you_ws_common.openapi.yaml#/components/parameters/sortDirection'
        - $ref: 'boat4you_ws_common.openapi.yaml#/components/parameters/pageNumber'
        - $ref: 'boat4you_ws_common.openapi.yaml#/components/parameters/pageSize'
        - $ref: 'boat4you_ws_common.openapi.yaml#/components/parameters/search'
        - $ref: 'boat4you_ws_common.openapi.yaml#/components/parameters/role'
        - in: query
          name: userStatus
          schema:
            $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/BasicEntityStatus'
          required: false
          description: User status to filter for
        - in: query
          name: activeOnly
          schema:
            type: boolean
          required: false
          example: false
          description: Whether only active users should be retrieved
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Fetch all users result
                required:
                  - content
                  - page
                properties:
                  content:
                    description: Users list
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  page:
                    $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/InternalPageModel'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
    put:
      tags:
        - Users
      summary: Create user
      description: This can only be done by the logged in user. Requires "SYSTEM_ADMIN" role.
      operationId: createUser
      requestBody:
        description: ''
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by user id
      description: |-
        This can only be done by the logged in user. Requires "SYSTEM_ADMIN" role.
        Logged users can only get information about themselves.
      operationId: getUserById
      parameters:
        - name: id
          in: path
          description: Id of the user to be fetched
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '404':
          description: User not found
        '500':
          description: Internal server error
    post:
      tags:
        - Users
      summary: Update user
      description: This can only be done by the logged in user. Requires "SYSTEM_ADMIN" role.
      operationId: updateUser
      parameters:
        - name: id
          in: path
          description: Id of the user to be updated
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Update an existing user
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
    delete:
      tags:
        - Users
      summary: Delete user
      description: This can only be done by the logged in user. Requires "SYSTEM_ADMIN" role.
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          description: Id of the user to be deleted
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /users/invite:
    get:
      tags:
        - Users
      summary: Check User invitation validity
      description: Called when User clicks on the invite link, so the FE knows if the invite expired or is invalid.
      operationId: checkUserInvitationValidity
      parameters:
        - name: inviteCode
          in: query
          description: Invite code for the User invite
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
    post:
      tags:
        - Users
      summary: Accept User invite and set password
      description: Invitation is marked as Accepted and User password is set.
      operationId: acceptInvitation
      parameters:
        - name: inviteCode
          in: query
          description: Invite code for the User invite
          required: true
          schema:
            type: string
      requestBody:
        description: Set new password for User being invited
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserPasswordBody'
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /users/invite/{ids}:
    put:
      tags:
        - Users
      summary: Invite users to the Application
      description: This can only be done by the logged in user. Requires "SYSTEM_ADMIN" or "MANAGER" role.
      operationId: inviteUsers
      parameters:
        - name: ids
          in: path
          description: Ids of the users to be invited
          required: true
          schema:
            type: array
            items:
              type: integer
              format: int64
      responses:
        '200':
          description: successful operation
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error

  /yachts/{id}:
    get:
      tags:
        - Yachts
      summary: Get yacht by yacht id
      description: Get yacht by yacht id
      operationId: getYacht
      parameters:
        - name: id
          in: path
          description: Id of the yacht to be fetched
          required: true
          schema:
            type: integer
            format: int64
        - name: dateFrom
          in: query
          description: Searches price from this date forward (today is a default value)
          required: false
          schema:
            type: string
            format: date
            example: 2025-04-25
        - name: dateTo
          in: query
          description: Searches price up to this date forward
          required: false
          schema:
            type: string
            format: date
            example: 2025-04-25
        - name: currency
          in: query
          description: Currency to convert price into
          required: false
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YachtDetailsDto'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '404':
          description: Yacht not found
        '500':
          description: Internal server error
  /yachts:
    get:
      tags:
        - Yachts
      summary: Fetch all yachts by search criteria
      description: Fetch all yachts by search criteria
      operationId: getYachts
      parameters:
        - in: query
          name: locationId
          schema:
            type: string
          required: false
          example: l-15
          description: Id of the wanted locationId. First letter always signals if the location is country (c), region (r) or marina (l)
        - in: query
          name: modelId
          schema:
            type: integer
          required: false
        - in: query
          name: charterType
          schema:
            type: string
          required: false
          example: Crewed
        - in: query
          name: vesselType
          schema:
            $ref: '#/components/schemas/VesselType'
          required: false
          example: CATAMARAN
        - in: query
          name: manufacturer
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - in: query
          name: model
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - in: query
          name: mainSailType
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SailTypeEnum'
          required: false
          example: CLASSIC_SAIL
        - in: query
          name: minBuildYear
          schema:
            type: integer
          required: false
          example: 2015
        - in: query
          name: maxBuildYear
          schema:
            type: integer
          required: false
          example: 2022
        - in: query
          name: minPersons
          schema:
            type: integer
          required: false
          example: 4
        - in: query
          name: maxPersons
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: minCabins
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: maxCabins
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: minBerths
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: maxBerths
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: minLength
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: maxLength
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: minPrice
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: maxPrice
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: startDate
          schema:
            type: string
            format: date
            example: 2025-04-28
          required: false
        - in: query
          name: endDate
          schema:
            type: string
            format: date
            example: 2025-04-28
          required: false
        - in: query
          name: minWc
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: maxWc
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: minEnginePower
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: maxEnginePower
          schema:
            type: integer
          required: false
          example: 6
        - in: query
          name: currency
          schema:
            type: string
          required: false
          example: USD
        - in: query
          name: sortBy
          schema:
            type: string
          required: false
        - in: query
          name: sortDirection
          schema:
            type: string
          required: false
        - in: query
          name: page
          schema:
            type: integer
            default: 0
          required: false
        - in: query
          name: size
          schema:
            type: integer
            default: 9
          required: false
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Fetch all yachts by search criteria result
                required:
                  - content
                  - page
                properties:
                  content:
                    description: Yachts list
                    type: array
                    items:
                      $ref: '#/components/schemas/YachtSearchResponseDto'
                  page:
                    $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/InternalPageModel'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '403':
          description: Not authorized
        '500':
          description: Internal server error
  /yachts/vesselTypes:
    get:
      tags:
        - Yachts
      summary: Fetches a list of only used vessel types
      description: Fetches a list of only used vessel types
      operationId: getUsedVesselTypes
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Fetch list of used vessel types
                required:
                  - content
                  - totalElements
                properties:
                  content:
                    description: List of used vessel types
                    type: array
                    items:
                      $ref: '#/components/schemas/VesselType'
                  totalElements:
                    description: Total number of entities
                    type: integer
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '500':
          description: Internal server error
  /yachts/type-count:
    get:
      tags:
        - Yachts
      summary: Fetch list of objects with each one containing vessel type paired with number of boats under it
      description: Fetch list of objects with each one containing vessel type paired with number of boats under it
      operationId: getVesselTypeYachtCount
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Fetch all vessel type boat counts result
                required:
                  - content
                  - totalElements
                properties:
                  content:
                    description: List of objects with vessel type and count of boats per each
                    type: array
                    items:
                      $ref: '#/components/schemas/VesselTypeYachtCountDto'
                  totalElements:
                    description: Total number of entities
                    type: integer
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '500':
          description: Internal server error
  /yachts/charterTypes:
    get:
      tags:
        - Yachts
      summary: Gets used charter types
      description: Gets used charter types
      operationId: getUsedCharterTypes
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Gets used charter types
                required:
                  - content
                  - totalElements
                properties:
                  content:
                    description: List of used charter types
                    type: array
                    items:
                      $ref: '#/components/schemas/CharterType'
                  totalElements:
                    description: Total number of entities
                    type: integer
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/ErrorSchema'
        '500':
          description: Internal server error
  /yachts/{id}/availability:
    get:
      tags:
        - Yachts
      summary: Fetches offers for a specific yacht
      description: Fetches offers for a specific yacht
      operationId: getYachtAvailability
      parameters:
        - name: id
          in: path
          description: Id of the yacht
          required: true
          schema:
            type: integer
            format: int64
        - name: month
          in: query
          required: false
          schema:
            type: integer
            format: date
            example: 2025-04-25
        - name: year
          in: query
          required: true
          schema:
            type: integer
            format: date
            example: 2025-04-25
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Fetches offers for a specific yacht
                required:
                  - content
                  - totalElements
                properties:
                  content:
