components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    SailTypeEnum:
      type: integer
      enum:
        - UNKNOWN
        - CLASSIC_SAIL
        - ROLLING_SAIL
    CharterType:
      type: integer
      enum:
        - UNKNOWN
        - BAREBOAT
        - CREWED
        - CRUISE
        - ALL_INCLUSIVE
    ExternalReservationStatus:
      type: integer
      enum:
        - UNKNOWN
        - OPTION
        - RESERVATION
        - SERVICE
        - FREE
    VesselType:
      type: integer
      enum:
        - OTHER
        - CATAMARAN
        - GULET
        - HOUSE_BOAT
        - LUXURY_CATAMARAN
        - LUXURY_MOTOR_YACHT
        - LUXURY_SAILING_YACHT
        - MINI_CRUISER
        - MOTORBOAT
        - MOTOR_YACHT
        - MOTORSAILER
        - POWER_CATAMARAN
        - SAILING_YACHT
        - TRIMARAN
    ReservationFlowStatus:
      type: integer
      enum:
        - UNKNOWN
        - IN_PROGRESS
        - DONE
        - ABANDONED
    EntryType:
      type: integer
      enum:
        - UNKNOWN
        - EXTERNAL
        - CUSTOM
    OfferStatus:
      type: integer
      enum:
        - UNKNOWN
        - FREE
        - OPTION
        - UNAVAILABLE
    LanguageEnum:
      type: string
      enum:
        - EN
        - FR
        - DE
        - PT
        - IT
        - ES
        - HR
        - PL
        - NL
    CurrencyEnum:
      type: string
      enum:
        - EUR
        - USD
        - GBP
        - CAD
        - AUD
        - CHF
        - ARS
        - ZAR
        - BRL
        - NOK
        - CZK
        - DKK
        - ILS
        - SGD
        - NZD
        - SEK
    User:
      type: object
      required:
        - email
        - name
        - surname
        - roles
      properties:
        id:
          type: integer
          format: int64
          example: 10
        password:
          type: string
          description: Password in clear text
        name:
          type: string
          example: Blaž
        surname:
          type: string
          example: Slišković
        email:
          type: string
          example: bsliskov@workspace.hr
        phoneNumber:
          type: string
          description: Phone number in international format
          example: +385911002000
        address:
          type: string
          description: Optional street address. Some charter agencies require it on the reservation.
          example: Ilica 1
        city:
          type: string
          description: Optional city. Some charter agencies require it on the reservation.
          example: Zagreb
        country:
          type: string
          description: Optional country. Some charter agencies require it on the reservation.
          example: Croatia
        birthday:
          type: string
          format: date
          description: Optional date of birth. Used by the annual birthday-greeting cron — month + day are matched, the year is informational.
          example: 1990-03-15
        language:
          type: string
          $ref: '#/components/schemas/LanguageEnum'
        currency:
          type: string
          $ref: '#/components/schemas/CurrencyEnum'
        userStatus:
          $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/BasicEntityStatus'
        inviteStatus:
          $ref: '#/components/schemas/UserInviteStatus'
        roles:
          description: List of roles assigned to the user
          type: array
          items:
            $ref: 'boat4you_ws_common.openapi.yaml#/components/schemas/UserRole'
    UserInviteStatus:
      description: Status of User invitation. Not sent in a request, just received in a response.
      type: string
      readOnly: true
      enum:
        - NOT_INVITED
        - INVITED
        - ACCEPTED
    UserRegistrationRequest:
      type: object
      description: Used when User is being registered via the public endpoint
      required:
        - name
        - surname
        - email
        - password
      properties:
        name:
          type: string
          example: Blaž
        surname:
          type: string
          example: Slišković
        email:
          type: string
          example: bsliskov@workspace.hr
        password:
          type: string
          description: Password in clear text
        phoneNumber:
          type: string
          description: Phone number in international format
          example: +385911002000
    UserEmailVerificationRequest:
      type: object
      description: Used when User is verifying their email address during registration
      required:
        - userId
        - verificationCode
      properties:
        userId:
          description: Id of the User whose email is being verified
          type: integer
          format: int64
          example: 10
        verificationCode:
          type: string
          description: Verification code in clear text
    RequestPasswordResetBody:
      type: object
      description: Either userId can be provided (if password reset is requested by Manager or System Administrator) or email address (if the request is made by anonymous user)
      properties:
        userId:
          description: Id of the User whose password needs to be reset
          type: integer
          format: int64
          example: 10
        email:
          description: Email address of the User whose password needs to be reset
          type: string
    SetUserPasswordBody:
      type: object
      required:
        - password
      properties:
        password:
          description: New password in clear text.
          type: string
          format: password
    VesselTypeYachtCountDto:
      type: object
      properties:
        vesselType:
          type: integer
          $ref: '#/components/schemas/VesselType'
        yachtCount:
          type: integer
          format: int64
          example: 10
    YachtDetailsDto:
      type: object
      required:
        - name
        - model
        - agency
        - location
        - yachtImages
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Big Blue Yacht
        buildYear:
          type: integer
          example: 2011
        maxPersons:
          type: integer
          example: 6
        cabins:
          type: integer
          example: 4
        wc:
          type: integer
          example: 2
        berths:
          type: integer
          example: 4
        enginePower:
          type: integer
          example: 100
        fuelTank:
          type: integer
          example: 80
        waterTank:
          type: integer
          example: 120
        beam:
          type: integer
          example: 120
        mainSailType:
          type: integer
          $ref: '#/components/schemas/SailTypeEnum'
        length:
          type: integer
          example: 15
        model:
          type: string
        clientPriceEur:
          type: integer
          example: 100
        totalPriceEur:
          type: integer
          example: 100
        clientPriceInfo:
          type: integer
          example: 100
        totalPriceCalcInfo:
          type: integer
          example: 100
        agency:
          $ref: '#/components/schemas/AgencyDto'
        location:
          $ref: '#/components/schemas/LocationDto'
        yachtImages:
          type: array
          items:
            $ref: '#/components/schemas/YachtImageDto'
        sysDescription:
          type: string
          example: very good yacht
        fixedPrice:
          type: integer
          example: 100
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LocationViewDto'
    YachtSearchResponseDto:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Big Blue Yacht
        location:
          $ref: '#/components/schemas/LocationDto'
