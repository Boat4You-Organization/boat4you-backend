# Email transactional copy — English (base / fallback)
# Keys are organised per template; shared chrome (footer, legal) lives
# under `email.footer.*`. Placeholders use `{0}`, `{1}` (Spring/JDK
# MessageFormat). Thymeleaf reads via `#{key(arg0,arg1)}`.

# --- Shared footer / legal --------------------------------------------------
