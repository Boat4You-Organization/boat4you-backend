server:
  ssl:
    enabled: false
  port: 8080
  # Bind to loopback only — nginx (running on the same VM) reaches us via
  # 127.0.0.1:8080. Without this, the JVM listens on 0.0.0.0:8080 and the
  # public IP exposes plaintext HTTP on 8080, allowing anyone to bypass the
  # nginx TLS terminator and rate limiter (F1-049, prod review 2026-05-07).
  address: 127.0.0.1
application:
  external:
    sync:
      offer-max-years: 1
      audit:
        enabled: true
        response-body: false
    nausys:
      base-url: ${NAUSYS_URL:http://ws.nausys.com}
      username: ${NAUSYS_USERNAME}
      password: ${NAUSYS_PASSWORD}
    mmk:
      base-url: ${MMK_URL:https://www.booking-manager.com/api/v2}
      bearer: ${MMK_TOKEN}
  email:
    # Customer-visible From. Falls through to the env var first so we can
    # rotate without a redeploy; default keeps the boat4you mailbox.
    from-address: ${EMAIL_FROM_ADDRESS:Boat4You | Endless blue. Boats 4 you <info@boat4you.com>}
  invites:
    user:
      allow-uninvited-login: false
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
spring:
  mail:
    host: ${MAIL_SERVER_HOST}
    port: ${MAIL_SERVER_PORT}
    username: ${MAIL_SERVER_USERNAME}
    password: ${MAIL_SERVER_PASSWORD}
    properties:
      mail:
        test-connection: ${application.email.enabled}
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boat4you_db}
    # Production must supply DB credentials via env. No literal default.
    username: ${DB_USER:?DB_USER required}
    password: ${DB_PASSWORD:?DB_PASSWORD required}
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boat4you_db}
    user: ${FLYWAY_USER:?FLYWAY_USER required}
    password: ${FLYWAY_PASSWORD:?FLYWAY_PASSWORD required}
    out-of-order: ${FLYWAY_OUT_OF_ORDER:false}
  jpa:
    properties:
      format_sql: false
    show-sql: false
