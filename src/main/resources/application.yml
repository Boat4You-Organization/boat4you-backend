server:
  host: ${SERVER_HOST:https://localhost:8443}
  host-public: ${SERVER_HOST_PUBLIC:http://localhost:5173}
  host-admin-public: ${SERVER_HOST_ADMIN_PUBLIC:http://localhost:5173}
  ssl:
    enabled: true
    key-store-type: PKCS12
    key-store: classpath:boat4you_selfsigned.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-alias: boat4you
  port: 8443
  tomcat:
    max-swallow-size: 128MB

spring:
  application:
    name: boat4you-ws
  messages:
    # Email + general copy resource bundles. Each
    # `messages/email_<locale>.properties` file holds the per-language
    # strings used by Thymeleaf via `th:text="#{key}"` and resolved in
    # Kotlin via `MessageSource.getMessage(...)`. Locale is determined
    # per-call (user.language → fallback EN; admin invite forces EN).
    basename: messages/email
    encoding: UTF-8
    fallback-to-system-locale: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:boat4you_db}
    # Fail fast at startup if DB credentials are missing (instead of falling
    # back to literal "postgres"/"postgres" placeholders that mask config
    # mistakes). Profile-specific yml (application-dev / application-prod)
    # may still supply its own defaults for the local dev workflow.
    username: ${DB_USER:?DB_USER required}
    password: ${DB_PASSWORD:?DB_PASSWORD required}
    driverClassName: org.postgresql.Driver
    generate-unique-name: false
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:25}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: boat4you-hikari
  jpa:
    open-in-view: false
    properties:
      org:
        hibernate:
          envers:
            audit_table_suffix: _revisions
            store_data_at_delete: true
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    hibernate:
      ddl-auto: validate
  mail:
    # Host / port / SSL knobs are env-overridable so dev runs against the
    # boat4you SMTP (`mail.boat4you.com:465`, SMTPS) can flip via env vars
    # without touching the prod profile. Defaults still target Gmail SMTP
    # for any setup that hasn't been migrated yet.
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
          ssl:
            # SMTPS port (465) needs ssl.enable=true; STARTTLS (587)
            # leaves this off and uses the upgrade dance above.
            enable: ${MAIL_SSL_ENABLE:false}
  flyway:
    enabled: true
    baseline-version: 1
    validateOnMigrate: true
    driver-class-name: org.postgresql.Driver
    target: ${FLYWAY_TARGET_VERSION:latest}
    out-of-order: ${FLYWAY_OUT_OF_ORDER:false}
  web:
    resources:
      add-mappings: ${SWAGGER_ENDPOINT_ENABLED:true}
  cache:
    type: jcache
    jcache:
      provider: org.ehcache.jsr107.EhcacheCachingProvider
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENDPOINT_ENABLED:true}
#    path: /api-docs
  swagger-ui:
    urls:
      - name: 1-entities-crud
        url: /boat4you_ws_entities_crud.openapi.yaml
      - name: 2-nausys
        url: /nausys_v6.openapi.yaml
      - name: 3-mmk
        url: /mmk_api_2_1_5.yaml
      - name: 4-boat4you
        url: /v3/api-docs
    path: /swagger

application:
  cors:
    # Comma-separated list of frontends allowed to make credentialed CORS
    # requests. Override per-env via APPLICATION_CORS_ALLOWED_ORIGINS.
    # Wildcard "*" is intentionally NOT supported with allowCredentials=true
    # — Spring will throw at startup. Prod MUST list hosts explicitly.
    allowed-origins: ${APPLICATION_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000 # a day
      refresh-token:
        expiration: 259200000 # 3 days (reduced from 7 on 23.4.2026 per security audit)
  external:
    sync:
      offer-max-years: 2
      min-duration-days: 3
      image-sync-count: 5000
      image-sync-batch: 10
      audit:
        enabled: true
        # Default to false so PII (NauSys/MMK responses contain customer
        # names, emails, phones) doesn't end up in audit storage by accident.
        # Profile-specific yml (e.g. dev) can flip this on for debugging.
        response-body: false
  email:
    enabled: ${EMAIL_ENABLED:false}
    # From-address shown in the recipient inbox. SMTP auth happens with
    # `MAIL_USERNAME` (no-reply@boat4you.com on prod), but the visible
    # From line is `info@boat4you.com` so customers / leads see the
    # mailbox they should reach. Reply-To headers (set per email) still
    # win for the Reply button — see InquiryEmailService for the
    # inquiry-specific override that points back at the lead. Fully
    # env-overridable (`EMAIL_FROM_ADDRESS`).
    from-address: ${EMAIL_FROM_ADDRESS:Boat4You | Endless blue. Boats 4 you <no-reply@boat4you.com>}
    # Reply-To header for customer-bound transactional mail (booking confirmed,
    # cancellation, reminders). When the customer hits Reply on an automated
    # email their response should reach a human inbox, not the no-reply alias.
    # Admin-bound paths (inquiry notification, cancellation request notice)
    # override this per-call with the lead/customer's own email so a "Reply"
    # click from the admin lands directly on the customer.
    reply-to-address: ${EMAIL_REPLY_TO_ADDRESS:info@boat4you.com}
  invites:
    user:
      expiration: 7d
      allow-uninvited-login: true
  password-reset:
    # OWASP Forgot Password cheatsheet recommends short-lived reset
    # tokens (typically not more than ~1h). 60 minutes balances the
    # security posture with users who don't open their inbox immediately.
    expiration: 60m
  stripe:
    enabled: true
    # Fail fast at startup if the Stripe credentials are missing instead of
    # falling back to literal "sk_test"/"whsec" placeholders that lead to
    # confusing "session not found" errors downstream.
    # Keys MUST come from the environment (.env / boat4you_vars.env).
    secret-key: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY required}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET required}
