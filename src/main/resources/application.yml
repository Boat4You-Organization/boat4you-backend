server:
  host: ${SERVER_HOST:https://localhost:8443}
  host-public: ${SERVER_HOST_PUBLIC:http://localhost:5173}
  host-admin-public: ${SERVER_HOST_ADMIN_PUBLIC:http://localhost:5173}
  ssl:
    enabled: true
    key-store-type: PKCS12
    key-store: classpath:boat4you_selfsigned.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-alias: boat4you
  port: 8443
  tomcat:
    max-swallow-size: 128MB

spring:
  application:
    name: boat4you-ws
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:boat4you_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driverClassName: org.postgresql.Driver
    generate-unique-name: false
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:25}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: boat4you-hikari
  jpa:
    open-in-view: false
    properties:
      org:
        hibernate:
          envers:
            audit_table_suffix: _revisions
            store_data_at_delete: true
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    hibernate:
      ddl-auto: validate
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: true
    baseline-version: 1
    validateOnMigrate: true
    driver-class-name: org.postgresql.Driver
    target: ${FLYWAY_TARGET_VERSION:latest}
    out-of-order: ${FLYWAY_OUT_OF_ORDER:false}
  web:
    resources:
      add-mappings: ${SWAGGER_ENDPOINT_ENABLED:true}
  cache:
    type: jcache
    jcache:
      provider: org.ehcache.jsr107.EhcacheCachingProvider
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENDPOINT_ENABLED:true}
#    path: /api-docs
  swagger-ui:
    urls:
      - name: 1-entities-crud
        url: /boat4you_ws_entities_crud.openapi.yaml
      - name: 2-nausys
        url: /nausys_v6.openapi.yaml
      - name: 3-mmk
        url: /mmk_api_2_1_5.yaml
      - name: 4-boat4you
        url: /v3/api-docs
    path: /swagger

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days
  external:
    sync:
      offer-max-years: 2
      min-duration-days: 3
      image-sync-count: 5000
      image-sync-batch: 10
      audit:
        enabled: true
        response-body: true
  email:
    enabled: ${EMAIL_ENABLED:false}
    from-address: no-reply@workspace.hr
  invites:
    user:
      expiration: 7d
      allow-uninvited-login: true
  stripe:
    enabled: true
    secret-key: ${STRIPE_SECRET_KEY:sk_test}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec}
  viva:
    enabled: true
    oauth-url: ${VIVA_OAUTH_URL:https://demo-accounts.vivapayments.com/connect/token}
    api-url: ${VIVA_API_URL:https://demo-api.vivapayments.com}
    checkout-url: ${VIVA_CHECKOUT_URL:https://demo.vivapayments.com/web/checkout}
    source-code: ${VIVA_SOURCE_CODE:1234}
    merchant-id: ${VIVA_MERCHANT_ID:mchid}
    webhook-verification-api-key: ${VIVA_WEBHOOK_VERIFICATION_API_KEY:wvak}
    webhook-verification-base-url: ${VIVA_WEBHOOK_VERIFICATION_BASE_URL:https://demo.vivapayments.com}
    client-id: ${VIVA_CLIENT_ID:vcid_test}
    client-secret: ${VIVA_CLIENT_SECRET:vcs_test}
  test:
    enabled: true
